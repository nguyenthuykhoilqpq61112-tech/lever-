<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="高考志愿咨询助手选择框架：先问清路径，再比较学校城市和专业">
  <defs>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#fbfdff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#fbfdff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-24%" width="136%" height="154%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif}
      .kicker{font-size:23px;font-weight:780;letter-spacing:2px;fill:#0f766e}
      .title{font-size:66px;font-weight:860;fill:#0f172a}
      .sub{font-size:26px;font-weight:580;fill:#475569}
      .cardTitle{font-size:34px;font-weight:840;fill:#0f172a}
      .cardText{font-size:23px;font-weight:590;fill:#56677c}
      .small{font-size:20px;font-weight:700;fill:#64748b}
    </style>
  </defs>

  <image href="backgrounds/decision-framework-bg.png" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="330" fill="url(#topFade)"/>

  <g transform="translate(92 76)">
    <text class="font kicker" x="0" y="0">CHOICE FRAMEWORK</text>
    <text class="font title" x="0" y="88">不是学校好坏题，而是路径取舍题</text>
    <text class="font sub" x="2" y="132">同一所学校，在不同孩子身上可能是好选择，也可能是错配。</text>
  </g>

  <g transform="translate(104 250)" filter="url(#shadow)">
    <rect width="420" height="304" rx="34" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="28" y="28" width="74" height="74" rx="24" fill="#ecfeff"/>
    <text class="font" x="50" y="76" font-size="27" font-weight="850" fill="#0f766e">01</text>
    <text class="font cardTitle" x="126" y="72">城市就业型</text>
    <text class="font cardText" x="42" y="142">看重实习、校招、毕业季便利。</text>
    <text class="font cardText" x="42" y="184">适合四年后想尽快落地就业。</text>
    <text class="font small" x="42" y="250">要问：平台和升学机会是否够用？</text>
  </g>

  <g transform="translate(590 250)" filter="url(#shadow)">
    <rect width="420" height="304" rx="34" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="28" y="28" width="74" height="74" rx="24" fill="#eff6ff"/>
    <text class="font" x="50" y="76" font-size="27" font-weight="850" fill="#2563eb">02</text>
    <text class="font cardTitle" x="126" y="72">升学跳板型</text>
    <text class="font cardText" x="42" y="142">看重学风、保研考研、导师资源。</text>
    <text class="font cardText" x="42" y="184">适合愿意用四年换下一次跃迁。</text>
    <text class="font small" x="42" y="250">要问：如果升学失败，退路能否接受？</text>
  </g>

  <g transform="translate(1076 250)" filter="url(#shadow)">
    <rect width="420" height="304" rx="34" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="28" y="28" width="74" height="74" rx="24" fill="#fffbeb"/>
    <text class="font" x="50" y="76" font-size="27" font-weight="850" fill="#b45309">03</text>
    <text class="font cardTitle" x="126" y="72">特殊平台型</text>
    <text class="font cardText" x="42" y="142">看重行业、系统、区位或政策窗口。</text>
    <text class="font cardText" x="42" y="184">适合能接受不确定和阶段性吃苦。</text>
    <text class="font small" x="42" y="250">要问：上行没兑现，基本盘还行吗？</text>
  </g>

  <g transform="translate(264 786)">
    <rect width="1072" height="62" rx="31" fill="#0f172a" opacity="0.94"/>
    <text class="font" x="42" y="40" font-size="23" font-weight="760" fill="#ffffff">先选清楚“这条路想解决什么问题”，再比较学校、城市和专业。</text>
  </g>
</svg>
