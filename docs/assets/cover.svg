<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="高考志愿填报咨询辅助工具封面">
  <defs>
    <linearGradient id="readability" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbfdff" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="#fbfdff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbfdff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#123b46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .font{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif}
      .eyebrow{font-size:24px;font-weight:760;letter-spacing:2px;fill:#0f766e}
      .title{font-size:116px;font-weight:860;fill:#0f172a}
      .subtitle{font-size:38px;font-weight:780;fill:#155e75}
      .lead{font-size:32px;font-weight:760;fill:#172033}
      .body{font-size:24px;font-weight:560;fill:#475569}
      .pill{font-size:20px;font-weight:760;fill:#0f766e}
    </style>
  </defs>

  <image href="backgrounds/cover-bg.png" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#readability)"/>

  <g transform="translate(104 92)">
    <text class="font eyebrow" x="0" y="0">NON-COMMERCIAL · AI AGENT SKILL</text>
    <text class="font title" x="0" y="132">高考志愿咨询助手</text>
    <text class="font subtitle" x="4" y="196">高考志愿填报咨询辅助工具</text>
    <text class="font lead" x="4" y="290">把志愿填报从焦虑选择，变成可核验的家庭决策。</text>
    <text class="font body" x="4" y="350">先问清学生和家庭，再整理学校与专业，</text>
    <text class="font body" x="4" y="388">最后把依据、风险和待核验事项说清楚。</text>
  </g>

  <g transform="translate(108 520)" filter="url(#shadow)">
    <rect width="196" height="64" rx="32" fill="#ffffff" stroke="#99f6e4"/>
    <text class="font pill" x="50" y="40">先问清</text>
    <rect x="226" width="196" height="64" rx="32" fill="#ffffff" stroke="#bfdbfe"/>
    <text class="font pill" x="276" y="40" fill="#1d4ed8">有依据</text>
    <rect x="452" width="196" height="64" rx="32" fill="#ffffff" stroke="#fde68a"/>
    <text class="font pill" x="502" y="40" fill="#b45309">讲风险</text>
  </g>

  <g transform="translate(104 760)">
    <rect width="760" height="70" rx="24" fill="url(#navy)" opacity="0.96"/>
    <text class="font" x="36" y="44" font-size="24" font-weight="760" fill="#ffffff">不是替你拍板，而是帮你看清每个选择的得失。</text>
  </g>
</svg>
